<!DOCTYPE html>
<html lang="tr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağ Çalışma Uygulaması</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
        }

        .sidebar {
            height: 100vh;
            overflow-y: auto;
        }

        .main-content {
            height: 100vh;
            overflow-y: auto;
        }

        .nav-item {
            transition: all 0.2s;
        }

        .nav-item:hover {
            background-color: #1f2937;
        }

        .nav-item.active {
            background-color: #3b82f6;
            color: white;
        }

        .tooltip {
            visibility: hidden;
            position: absolute;
            z-index: 50;
            background: #1e293b;
            border: 1px solid #3b82f6;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: 250px;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .dict-term:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .dict-term {
            position: relative;
            border-bottom: 1px dashed #60a5fa;
            cursor: help;
            color: #60a5fa;
        }

        .mermaid {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .dict-panel {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }

        .dict-panel.open {
            transform: translateX(0);
        }
    </style>
</head>

<body class="flex">

    <!-- Kenar Çubuğu -->
    <nav class="sidebar w-72 bg-gray-800 border-r border-gray-700 flex-shrink-0 p-4 hidden md:block">
        <h1 class="text-xl font-bold mb-6 text-blue-400">Ağ Çalışma Rehberi</h1>
        <ul id="nav-list">
            <!-- JS ile doldurulacak -->
        </ul>
        <button onclick="toggleDictionary()"
            class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded">
            📖 Sözlük
        </button>
    </nav>

    <!-- Ana İçerik -->
    <main class="main-content flex-1 p-6 md:p-10" id="main-content">
        <div class="md:hidden mb-4">
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
                class="bg-gray-800 p-2 rounded">Menü</button>
            <div id="mobile-menu" class="hidden bg-gray-800 mt-2 p-4 rounded absolute z-40">
                <ul id="nav-list-mobile"></ul>
                <button onclick="toggleDictionary()"
                    class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded">Sözlük</button>
            </div>
        </div>
        <div id="content-area" class="max-w-4xl mx-auto">
            <!-- İçerik buraya enjekte edilecek -->
        </div>
    </main>

    <!-- Sözlük Paneli -->
    <div id="dict-panel"
        class="dict-panel fixed top-0 right-0 h-full w-80 bg-gray-800 border-l border-gray-700 p-6 z-50 shadow-2xl">
        <button onclick="toggleDictionary()" class="absolute top-4 right-4 text-gray-400 hover:text-white">✖</button>
        <h2 class="text-xl font-bold mb-4 text-blue-400">Sözlük</h2>
        <input type="text" id="dict-search" placeholder="Terim ara..."
            class="w-full mb-4 p-2 bg-gray-700 rounded text-white" onkeyup="filterDictionary()">
        <div id="dict-list" class="overflow-y-auto h-[calc(100vh-10rem)]">
            <!-- JS ile doldurulacak -->
        </div>
    </div>

    <script>
        // --- VERİ YAPILARI ---

        const dictionary = {
            "RTT": "Gidiş-Dönüş Süresi (Round Trip Time): Küçük bir paketin istemciden sunucuya gidip geri gelmesi için geçen süre.",
            "Yayılma Gecikmesi": "Bir bitin yönlendiriciden bağlantıya gitmesi için gereken süre: d/s (mesafe/hız).",
            "İletim Gecikmesi": "Bir paketin tüm bitlerini bağlantıya itmek için geçen süre: L/R (uzunluk/oran).",
            "Paket Anahtarlama": "Kaynaklar ayrılmaz; paketler bağımsız olarak iletilir. Patlamalı (bursty) veriler için verimlidir.",
            "Devre Anahtarlama": "Yol boyunca kaynaklar ayrılır (FDM/TDM). Performans garantiler ama boşta kalan kapasiteyi israf eder.",
            "FDM": "Frekans Bölmeli Çoğullama: Bant genişliğini frekans bantlarına böler.",
            "TDM": "Zaman Bölmeli Çoğullama: Zamanı yuvalara (slot) böler.",
            "Protokol": "Gönderilen/alınan mesajların formatını, sırasını ve gerçekleştirilen eylemleri yöneten kurallar.",
            "HTTP": "HiperMetin Aktarım Protokolü: Web'in uygulama katmanı protokolü, TCP kullanır.",
            "SMTP": "Basit Posta Aktarım Protokolü: E-posta göndermek için İtme (Push) protokolü, TCP kullanır.",
            "DNS": "Alan Adı Sistemi: Makine adlarını IP adreslerine çevirir. Dağıtık, hiyerarşik veritabanı.",
            "DASH": "HTTP Üzerinden Dinamik Adaptif Akış: Bant genişliğine göre farklı kalite oranlarında video akışı.",
            "CDN": "İçerik Dağıtım Ağı: İçeriğin kopyalarını coğrafi olarak dağıtılmış düğümlerde saklar.",
            "Çoğullama": "Birden fazla soketten veri toplayıp başlık bilgisi ekleme.",
            "Ayrıştırma": "Alınan segmentleri IP ve Port numaralarını kullanarak doğru sokete teslim etme.",
            "MSS": "Maksimum Segment Boyutu: Bir TCP segmentindeki uygulama katmanı verisinin maksimum miktarı.",
            "rdt": "Güvenilir Veri Aktarımı: Güvenilmez kanallar üzerinden hatasız, sıralı teslimat sağlayan protokoller.",
            "GBN": "Geri Dön (Go-Back-N): Göndericinin N penceresi olduğu, alıcının sadece birikimli ACK gönderdiği boru hattı protokolü.",
            "SR": "Seçmeli Tekrar (Selective Repeat): Alıcının tek tek onayladığı; göndericinin sadece kayıp olanları yeniden gönderdiği protokol.",
            "TCP": "İletim Kontrol Protokolü: Güvenilir, bağlantı yönelimli, akış ve tıkanıklık kontrollü.",
            "UDP": "Kullanıcı Verigramı Protokolü: Güvenilmez, bağlantısız aktarım protokolü.",
            "AIMD": "Toplamalı Artış Çarpımsal Azalış: TCP tıkanıklık kontrol algoritması.",
            "cwnd": "Tıkanıklık Penceresi: Göndericinin iletebileceği veri miktarını sınırlayan TCP değişkeni.",
            "MTU": "Maksimum İletim Birimi: En büyük bağlantı katmanı çerçeve boyutu.",
            "CIDR": "Sınıfsız Alanlar Arası Yönlendirme: Adresin alt ağ kısmının rastgele uzunlukta olması (a.b.c.d/x).",
            "DHCP": "Dinamik Ana Bilgisayar Yapılandırma Protokolü: Ana bilgisayarların dinamik olarak IP adresi almasını sağlar.",
            "NAT": "Ağ Adres Çevirisi: Özel iç adresleri tek bir genel dış IP'ye eşler.",
            "CRC": "Döngüsel Artıklık Kontrolü: Bağlantı katmanında kullanılan güçlü hata algılama kodu.",
            "CSMA/CD": "Çarpışma Algılamalı Taşıyıcı Duyarlı Çoklu Erişim: Ethernet'te kullanılır.",
            "CSMA/CA": "Çarpışmadan Kaçınmalı Taşıyıcı Duyarlı Çoklu Erişim: WiFi'de (802.11) kullanılır.",
            "ARP": "Adres Çözümleme Protokolü: Bir alt ağ içindeki IP adresini MAC adresine eşler.",
            "MIMO": "Çoklu Giriş Çoklu Çıkış: Verimliliği/artışı artırmak için birden fazla anten kullanma.",
            "OFDMA": "Dik Frekans Bölmeli Çoklu Erişim: Spektrumu dik alt taşıyıcılara böler.",
            "RSA": "Rivest-Shamir-Adelson: Büyük asal sayıları çarpanlarına ayırmaya dayalı açık anahtarlı şifreleme algoritması.",
            "Dijital İmza": "Özel anahtarla verinin özetinin (hash) şifrelenerek otantiklik ve bütünlüğün kanıtlanması.",
            "TLS": "Aktarım Katmanı Güvenliği: TCP üzerinden şifreleme, kimlik doğrulama, bütünlük sağlar.",
            "IPsec": "IP Güvenliği: Ağ katmanı güvenlik protokolü (AH/ESP), verigramlarını şifrelemek için kullanılır."
        };

        const contentData = {
            "ch1": {
                title: "Bölüm 1: Giriş",
                content: `
            <h2 class="text-2xl font-bold mb-4">1.1 İnternet Nedir?</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><span class="dict-term" data-term="Protokol">Protokol<span class="tooltip">${dictionary["Protokol"]}</span></span> mesajların formatını, sırasını ve eylemleri yönetir.</li>
                <li><strong>Cıvatalar ve Somunlar Görünümü:</strong> Milyarlarca bağlı cihaz (uç sistemler), iletişim bağlantıları (fiber, bakır, radyo) ve paket anahtarları (yönlendiriciler, anahtarlar).</li>
                <li><strong>Hizmet Görünümü:</strong> Uygulamalara (Web, akış, e-posta) programlama arayüzleri (soketler) aracılığıyla hizmet sağlayan altyapı.</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">1.2 Ağ Kenarı</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>Erişim Ağları:</strong>
                    <ul class="list-disc pl-6 mt-1">
                        <li>Kablo (HFC): Paylaşımlı bant genişliği, hibrit fiber-koaksiyel.</li>
                        <li>DSL: Merkez ofise özel hat, mevcut telefon hatlarını kullanır.</li>
                        <li>FTTH: Eve Kadar Fiber (Fiber To The Home).</li>
                        <li>Kablosuz: WLAN (WiFi), Hücresel (4G/5G).</li>
                    </ul>
                </li>
                <li><strong>Fiziksel Ortam:</strong> Yönlendirilmiş (Twisted pair, Koaksiyel, Fiber) vs. Yönlendirilmemiş (Radyo, WiFi, Uydu).</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">1.3 Ağ Çekirdeği</h2>
            <div class="bg-red-900/50 border border-red-500 text-red-100 p-3 rounded my-2"><strong>⚠️ KLASİK SINAV ODAĞI:</strong> Paket Anahtarlama vs Devre Anahtarlama'yı karşılaştırın. Paket anahtarlamanın patlamalı veriler için neden daha verimli olduğunu ancak gecikmelere/kayıplara neden olduğunu, devre anahtarlamanın ise performansı garanti ettiğini ancak kaynakları israf ettiğini açıklayın.</div>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><span class="dict-term" data-term="Devre Anahtarlama">Devre Anahtarlama<span class="tooltip">${dictionary["Devre Anahtarlama"]}</span></span>: Ayrılmış yol, kaynakları ayırır (FDM/TDM).</li>
                <li><span class="dict-term" data-term="Paket Anahtarlama">Paket Anahtarlama<span class="tooltip">${dictionary["Paket Anahtarlama"]}</span></span>: Ayırma yok, istatistiksel çoğullama.</li>
                <li><strong>Yönlendirme (Forwarding):</strong> Yerel eylem (paketi çıkış bağlantısına taşıma).</li>
                <li><strong>Rotlama (Routing):</strong> Küresel eylem (kaynaktan hedefe yolu belirleme).</li>
            </ul>
            <div class="mermaid">
            graph LR
                A[Devre Anahtarlama] -->|Ayrılmış| B(FDM/TDM)
                C[Paket Anahtarlama] -->|Paylaşımlı| D[Sakla ve İlet]
                D --> E[Kuyruk Gecikmesi]
                D --> F[Paket Kaybı]
            </div>

            <h2 class="text-2xl font-bold mb-4">1.4 Performans</h2>
            <div class="bg-red-900/50 border border-red-500 text-red-100 p-3 rounded my-2"><strong>⚠️ KLASİK SINAV ODAĞI:</strong> Toplam düğüm gecikmesini hesaplayın. d_nodal = d_proc + d_queue + d_trans + d_prop. Özellikle iletim ve yayılma gecikmelerini hesaplamak ve aralarındaki farkı açıklamak için hazırlıklı olun.</div>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><span class="dict-term" data-term="İletim Gecikmesi">İletim Gecikmesi<span class="tooltip">${dictionary["İletim Gecikmesi"]}</span></span>: L / R (Uzunluk / Bağlantı Bant Genişliği).</li>
                <li><span class="dict-term" data-term="Yayılma Gecikmesi">Yayılma Gecikmesi<span class="tooltip">${dictionary["Yayılma Gecikmesi"]}</span></span>: d / s (Mesafe / Ortamdaki ışık hızı).</li>
                <li><strong>Kuyruk Gecikmesi:</strong> Trafik yoğunluğuna (La/R) bağlıdır. La/R > 1 ise teorik olarak sonsuz gecikme.</li>
                <li><strong>Veri Üretimi (Throughput):</strong> Aktarılan bit oranı. Darboğaz bağlantısı uçtan uca veri üretimini sınırlar: min(R1, R2...).</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">1.5 Protokol Katmanları</h2>
            <div class="mermaid">
            graph TD
                A[Uygulama] --> B[Aktarım]
                B --> C[Ağ]
                C --> D[Bağlantı]
                D --> E[Fiziksel]
            </div>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>Kapsülleme (Encapsulation):</strong> Mesaj -> Segment (Ht) -> Verigram (Hn) -> Çerçeve (Hl). Her katman kendi başlığını ekler.</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">1.6 Güvenlik</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li>Kötü niyetli kişiler: Paket dinleme (Sniffing), IP Sahteciliği (Spoofing), Hizmet Durdurma (DoS).</li>
                <li>Savunma: Kimlik Doğrulama, Gizlilik (şifreleme), Bütünlük kontrolleri, Güvenlik Duvarları.</li>
            </ul>
        `
            },
            "ch2": {
                title: "Bölüm 2: Uygulama Katmanı",
                content: `
            <h2 class="text-2xl font-bold mb-4">2.1 Ağ Uygulamalarının İlkeleri</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>Mimariler:</strong> İstemci-Sunucu (her zaman açık sunucu) vs. P2P (kendinden ölçeklenebilen, eşler doğrudan iletişim kurar).</li>
                <li><strong>Soketler:</strong> Süreç ile aktarım protokolü arasındaki kapı.</li>
                <li><strong>Aktarım Hizmetleri:</strong> TCP (güvenilir, akış kontrolü, tıkanıklık kontrolü) vs. UDP (güvenilmez, garanti yok).</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">2.2 Web ve HTTP</h2>
            <div class="bg-red-900/50 border border-red-500 text-red-100 p-3 rounded my-2"><strong>⚠️ KLASİK SINAV ODAĞI:</strong> Kalıcı (Persistent) vs Kalıcı Olmayan (Non-persistent) HTTP'i ayırın. Kalıcı olmayan için yanıt süresini hesaplayın (nesne başına 2 RTT + iletim) vs kalıcı (1 RTT ek yük, boru hattı).</div>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>Kalıcı Olmayan:</strong> Nesne başına bir TCP bağlantısı. Nesne başına 2 RTT (1 TCP, 1 HTTP için).</li>
                <li><strong>Kalıcı:</strong> Tek bir TCP bağlantısı üzerinden birden fazla nesne.</li>
                <li><strong>Çerezler (Cookies):</strong> Durumsuz protokol üzerinden durum takibi. İstemcide çerez dosyası ve sunucuda arka uç veritabanı ile sağlanır.</li>
                <li><strong>Koşullu GET:</strong> Önbelleğin nesne tazeliğini nesneyi göndermeden doğrulamasını sağlar (If-modified-since başlığı). 304 Not Modified yanıtı.</li>
                <li><strong>HTTP/2:</strong> HOL (Head-of-Line) engellemesini, nesneleri karelere (frame) bölüp tek bir TCP bağlantısı üzerinden aralıklı göndererek azaltır.</li>
                <li><span class="dict-term" data-term="DASH">DASH<span class="tooltip">${dictionary["DASH"]}</span></span>: İstemci ne zaman, hangi kodlama oranında ve nereden içeriği çekeceğine karar verir.</li>
            </ul>
            <div class="mermaid">
            sequenceDiagram
                participant C as İstemci
                participant S as Sunucu
                C->>S: GET /nesne (If-Modified-Since: tarih)
                alt Değişmedi
                    S-->>C: 304 Not Modified
                else Değişti
                    S-->>C: 200 OK + Veri
                end
            </div>

            <h2 class="text-2xl font-bold mb-4">2.3 E-posta ve DNS</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>E-posta:</strong> Sunucudan sunucuya <span class="dict-term" data-term="SMTP">SMTP<span class="tooltip">${dictionary["SMTP"]}</span></span> (İtme, TCP port 25). Sunucudan istemciye IMAP/POP3 (Çekme).</li>
                <li><span class="dict-term" data-term="DNS">DNS<span class="tooltip">${dictionary["DNS"]}</span></span>: Makine adını IP'ye çevirir. Dağıtık, hiyerarşik veritabanı.
                    <ul class="list-disc pl-6 mt-1">
                        <li>Kök -> TLD (.com, .org) -> Yetkili (Authoritative).</li>
                        <li>Yinelenmiş (Iterated) vs Özyinelemeli (Recursive) sorgular.</li>
                        <li>Kayıtlar: (İsim, Değer, Tür, TTL). Türler: A, NS, CNAME, MX.</li>
                    </ul>
                </li>
            </ul>
            <div class="mermaid">
            graph TD
                A[Kök DNS Sunucusu] --> B[TLD .com Sunucusu]
                B --> C[Yetkili .example.com Sunucusu]
            </div>

            <h2 class="text-2xl font-bold mb-4">2.4 Video Akışı ve CDN'ler</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><span class="dict-term" data-term="CDN">CDN<span class="tooltip">${dictionary["CDN"]}</span></span>: Tek başarısızlık noktasını/tıkanıklığı aşar. "Derinlere gir" (Akamai) vs "Eve getir" (Limelight).</li>
            </ul>
        `
            },
            "ch3": {
                title: "Bölüm 3: Aktarım Katmanı",
                content: `
            <h2 class="text-2xl font-bold mb-4">3.1 Çoğullama ve Ayrıştırma</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>Bağlantısız (UDP):</strong> Sadece Hedef Port + Hedef IP kullanır. Aynı soket o port için tüm verigramlarını alır.</li>
                <li><strong>Bağlantı Yönelimli (TCP):</strong> 4'lü demet (4-tuple) kullanır: Kaynak IP, Kaynak Port, Hedef IP, Hedef Port. Her istemciye ayrı bir soket ayrılır.</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">3.2 UDP ve Sağlama Toplamı</h2>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><span class="dict-term" data-term="UDP">UDP<span class="tooltip">${dictionary["UDP"]}</span></span>: El sıkışma yok, bağlantı durumu yok, küçük başlık, tıkanıklık kontrolü yok.</li>
                <li><strong>İnternet Sağlama Toplamı:</strong> 16 bitlik kelimelerin (1'e tümleyen) toplamı. Hatalara karşı zayıf ama basit koruma.</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4">3.3 Güvenilir Veri Aktarımı İlkeleri (rdt)</h2>
            <div class="bg-red-900/50 border border-red-500 text-red-100 p-3 rounded my-2"><strong>⚠️ KLASİK SINAV ODAĞI:</strong> Geri Dön (Go-Back-N - GBN) vs Seçmeli Tekrar (Selective Repeat - SR) karşılaştırması. Gönderici/alıcı pencere boyutlarını, ACK'lerin nasıl çalıştığını ve kayıp durumunda ne olduğunu açıklayın. GBN: Birikimli ACK'ler, N pencere boyutu, alıcı sıra dışı gelenleri atar. SR: Bireysel ACK'ler, N pencere boyutu, alıcı sıra dışı gelenleri tamponlar.</div>
            <ul class="list-disc pl-6 mb-6 space-y-2">
                <li><strong>rdt 1.0:</strong> Tamamen güvenilir kanal.</li>
                <li><strong>rdt 2.0:</strong> Bit hatalı kanal. ACK/NAK kullanır. Ölümcül kusur: NAK/ACK bozulabilir.</li>
                <li><strong>rdt 2.1:</strong> Kopyaları (duplicate) yönetmek için sıra numaraları (0, 1) ekler.</li>
                <li><strong>rdt 3.0:</strong> Kayıp paketler için zaman aşımı (stop-and-wait) ekler. Çok düşük kullanım: U_sender = (L/R) / (RTT + L/R).</li>
                <li><strong>Boru Hattı (Pipelining):</strong> Beklemeden birden fazla paket gönderme. Sıra numaraları, tamponlama ve hata kurtarma (GBN veya SR) gerektirir.</li>
                <li><span class="dict-term" data-term="GBN">GBN<span class="tooltip">${dictionary["GBN"]}</span></span>: Gönderici penceresi N, Alıcı penceresi 1. Birikimli ACK. En eski onaylanmamışta zaman aşımı olursa N paket yeniden gönderilir.</li>
                <li><span class="dict-term" data-term="SR">SR<span class="tooltip">${dictionary["SR"]}</span></span>: Gönderici ve Alıcı penceresi N. Bireysel ACK'ler. Sadece kayıp paketi yeniden gönderir. Pencere boyutu sıra numarası uzayının yarısından küçük veya eşit olmalıdır.</li>

            <div class="mermaid">
            graph LR

        function buildNavigation() {
            const navList = document.getElementById('nav-list');
            const mobileNav = document.getElementById('nav-list-mobile');
            navList.innerHTML = '';
            mobileNav.innerHTML = '';

            Object.keys(contentData).forEach(key => {
                const item = contentData[key];
                const li = document.createElement('li');
                li.innerHTML = `<div class="nav-item p-2 rounded cursor-pointer mb-1" onclick="navigate('${key}')">${item.title}</div>`;
                navList.appendChild(li.cloneNode(true));
                mobileNav.appendChild(li.cloneNode(true));
            });
        }

        function navigate(id) {
            // Aktif durumu güncelle
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => {
                if (el.innerText === contentData[id].title) el.classList.add('active');
            });

            // İçeriği enjekte et
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = contentData[id].content;

            // Mermaid diyagramlarını oluştur
            mermaid.init(undefined, document.querySelectorAll('.mermaid'));

            // Mobil menüyü kapat
            document.getElementById('mobile-menu').classList.add('hidden');
        }

        function buildDictionary() {
            const dictList = document.getElementById('dict-list');
            dictList.innerHTML = '';
            const sortedKeys = Object.keys(dictionary).sort();

            sortedKeys.forEach(key => {
                const div = document.createElement('div');
                div.className = 'mb-3 dict-entry';
                div.innerHTML = `<strong class="text-blue-300">${key}</strong><br><span class="text-gray-400 text-sm">${dictionary[key]}</span>`;
                dictList.appendChild(div);
            });
        }

        function toggleDictionary() {
            document.getElementById('dict-panel').classList.toggle('open');
        }

        function filterDictionary() {
            const query = document.getElementById('dict-search').value.toLowerCase();
            const entries = document.getElementsByClassName('dict-entry');
            Array.from(entries).forEach(entry => {
                const text = entry.innerText.toLowerCase();
                entry.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        // Başlat
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        buildNavigation();
        buildDictionary();
        navigate('ch1'); // İlk bölümü varsayılan olarak yükle
